# vLLM-based jury configuration
# Migration test configuration with Qwen2.5-1.5B-Instruct

jury_members:
  - name: "ministral-14b"
    hf_model: "mistralai/Ministral-3-14B-Instruct-2512-BF16"
    local_path: "/nfs/staging/puertao/noharm/huggingface_cache/ministral-14b"
    size_gb: 28
    batch_size: 64
    vllm_config:
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.85
      max_model_len: 32768

  - name: "gemma3-27b"
    hf_model: "google/gemma-3-27b-it"
    local_path: "/nfs/staging/puertao/noharm/huggingface_cache/gemma3-27b"
    size_gb: 54
    batch_size: 32
    vllm_config:
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.85
      max_model_len: 32768

  - name: "nemotron-30b"
    hf_model: "nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16"
    local_path: "/nfs/staging/puertao/noharm/huggingface_cache/nemotron-30b"
    size_gb: 60
    batch_size: 24
    vllm_config:
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.85
      max_model_len: 32768
      trust_remote_code: true

  - name: "olmo-32b"
    hf_model: "allenai/Olmo-3.1-32B-Think"
    local_path: "/nfs/staging/puertao/noharm/huggingface_cache/olmo-32b-think"
    size_gb: 64
    batch_size: 24
    vllm_config:
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.85
      max_model_len: 32768

  - name: "qwen2.5-coder-7b"
    hf_model: "Qwen/Qwen2.5-Coder-7B-Instruct"
    local_path: "/nfs/staging/puertao/noharm/huggingface_cache/qwen2.5-coder-7b"
    size_gb: 15
    batch_size: 64
    vllm_config:
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.85
      max_model_len: 32768

inference_config:
  # Batch processing settings
  batch_size: 64              # Max prompts per batch
  temperature: 0.0            # Deterministic scoring
  max_tokens: 512             # For jury scoring

  # Response generation settings
  response_temperature: 0.0
  response_max_tokens: 1024

  # Aggregation (same as Ollama v2.3)
  aggregation_method: "median"
  critical_threshold: 0.4     # v2.3 critical dimension threshold

hardware:
  available_gpus: 2
  total_vram_gb: 190          # 2x H100 = 2x95GB
  max_model_vram_gb: 85       # Leave headroom
