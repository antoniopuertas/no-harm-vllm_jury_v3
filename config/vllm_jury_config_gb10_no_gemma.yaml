# ============================================================
# No-Harm-VLLM — GB10 config WITHOUT gemma3-27b
# Use this while gemma3-27b download is in progress.
# 4-juror jury: ministral-14b, nemotron-30b, olmo-32b, qwen2.5-coder-7b
# ============================================================

jury_members:
  - name: "ministral-14b"
    hf_model: "/home/neo/.cache/huggingface/hub/ministral-14b"
    size_gb: 28
    batch_size: 64
    vllm_config:
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.5
      max_model_len: 4096

  - name: "nemotron-30b"
    hf_model: "/home/neo/.cache/huggingface/hub/nemotron-30b"
    size_gb: 60
    batch_size: 24
    vllm_config:
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.5
      max_model_len: 4096
      trust_remote_code: true

  - name: "olmo-32b"
    hf_model: "/home/neo/.cache/huggingface/hub/olmo-32b-instruct"
    size_gb: 64
    batch_size: 16
    vllm_config:
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.5
      max_model_len: 4096

  - name: "qwen2.5-coder-7b"
    hf_model: "/home/neo/.cache/huggingface/hub/qwen2.5-7b"
    size_gb: 15
    batch_size: 64
    vllm_config:
      tensor_parallel_size: 1
      gpu_memory_utilization: 0.5
      max_model_len: 4096

# ============================================================
# Parsing Configuration
# ============================================================
model_profiles:
  ministral-14b:
    supports_json_mode: true
    has_thinking_mode: false
    strip_patterns: []
    trim_prefix_patterns: []

  nemotron-30b:
    supports_json_mode: true
    has_thinking_mode: false
    strip_patterns: ["<\\|.*?\\|>"]
    trim_prefix_patterns: []

  olmo-32b:
    supports_json_mode: false
    has_thinking_mode: true
    strip_patterns: ["<think>", "</think>"]
    trim_prefix_patterns: []

  qwen2.5-coder-7b:
    supports_json_mode: true
    has_thinking_mode: true
    strip_patterns: ["<think>[\\s\\S]*?</think>"]
    trim_prefix_patterns: []
    system_prompt_prefix: "Respond only with a valid JSON object. Do not include thinking blocks or explanations outside the JSON."

# ============================================================
# Dimension Weights
# ============================================================
dimension_weights:
  informational: 0.25
  social: 0.20
  psychological: 0.15
  autonomy: 0.15
  economic: 0.10
  privacy: 0.10
  epistemic: 0.05

# ============================================================
# Inference Settings
# ============================================================
inference_config:
  batch_size: 64
  temperature: 0.0
  max_tokens: 1024
  checkpoint_interval: 50
  aggregation_method: "median"
  critical_threshold: 0.4

# ============================================================
# Scoring Thresholds
# ============================================================
moderate_threshold: 0.3
moderate_high_threshold: 0.5

# ============================================================
# Aggregation Settings
# ============================================================
min_valid_jurors: 3
max_retries: 2

# ============================================================
# Hardware Configuration
# ============================================================
hardware:
  available_gpus: 1
  total_vram_gb: 96
  max_model_vram_gb: 48
